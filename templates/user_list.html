<!DOCTYPE html>
<html>
<head>
    <title>User List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Users</h5>
            <a href="{% url 'logout' %}" class="btn btn-sm btn-outline-danger">Logout</a>
        </div>

        <ul class="list-group list-group-flush">
            {% for item in user_data %}
                <li class="list-group-item d-flex justify-content-between align-items-center">

                    <a href="{% url 'chat' item.user.username %}"
                       class="text-decoration-none fw-medium">
                        {{ item.user.username }}
                    </a>

                    <div class="d-flex align-items-center gap-2">

                        {% if item.unread_count > 0 %}
                            <span class="badge bg-danger rounded-pill">
                                {{ item.unread_count }}
                            </span>
                        {% endif %}

                        <!-- ONLINE STATUS DOT -->
                        <span 
                            id="user-{{ item.user.username }}"
                            class="badge rounded-circle {% if item.user.is_online %}bg-success{% else %}bg-secondary{% endif %}"
                            style="width:12px; height:12px;">
                        </span>

                    </div>

                </li>
            {% empty %}
                <li class="list-group-item text-center">
                    No users found
                </li>
            {% endfor %}
        </ul>

    </div>

</div>

<script>
    const presenceSocket = new WebSocket(
        "ws://" + window.location.host + "/ws/presence/"
    );

    presenceSocket.onmessage = function(e) {
        const data = JSON.parse(e.data);

        const userElement = document.getElementById("user-" + data.user);

        if (userElement) {
            if (data.status === "online") {
                userElement.classList.remove("bg-secondary");
                userElement.classList.add("bg-success");
            } else {
                userElement.classList.remove("bg-success");
                userElement.classList.add("bg-secondary");
            }
        }
    };
</script>

</body>
</html>
